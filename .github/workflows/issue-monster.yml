# 👹 Issue Monster
# Parses plan checklist and creates linked sub-issues
name: "👹 Issue Monster"

on:
  issues:
    types: [labeled]


concurrency:n  group: issue-monster-${{ github.ref }}n  cancel-in-progress: truen
permissions:
  issues: write

jobs:
  create-sub-issues:
    if: github.event.label.name == 'planned'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            // Find the plan comment (from planner bot)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });

            const planComment = comments.data.find(c =>
              c.body.includes('## 📋 Implementation Plan') ||
              c.body.includes('Sub-tasks') ||
              c.body.includes('- [ ]')
            );

            if (!planComment) {
              console.log('No plan comment found, skipping');
              return;
            }

            // Parse checklist items from plan
            const checklistRegex = /^- \[ \] (.+)$/gm;
            const tasks = [];
            let match;
            while ((match = checklistRegex.exec(planComment.body)) !== null) {
              tasks.push(match[1].trim());
            }

            if (tasks.length === 0) {
              console.log('No tasks found in plan');
              return;
            }

            // Inherit labels from parent (except workflow labels)
            const skipLabels = new Set(['needs-plan', 'planned', 'sub-issues-created', 'size/S', 'size/M', 'size/L']);
            const parentLabels = issue.labels
              .map(l => l.name)
              .filter(l => !skipLabels.has(l));

            const subIssueLinks = [];

            for (const task of tasks) {
              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[${issue.number}] ${task}`,
                body: `## Sub-issue of #${issue.number}\n\n**Parent:** ${issue.title}\n\n**Task:** ${task}\n\n---\n*Auto-created by Issue Monster 👹*`,
                labels: [...parentLabels, 'sub-issue', 'size/S'],
              });
              subIssueLinks.push(`- #${subIssue.data.number} — ${task}`);
              console.log(`Created sub-issue #${subIssue.data.number}: ${task}`);
            }

            // Add summary comment to parent
            const summary = `## 👹 Sub-issues Created\n\n${subIssueLinks.join('\n')}\n\n---\n*All sub-issues must be closed before this issue auto-closes.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: summary,
            });

            // Label parent
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['sub-issues-created'],
            });

            // Ensure sub-issue label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'sub-issue',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'sub-issue',
                color: 'c5def5',
                description: 'Sub-issue of a parent issue',
              });
            }

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'sub-issues-created',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'sub-issues-created',
                color: '1d76db',
                description: 'Parent issue with sub-issues created',
              });
            }
