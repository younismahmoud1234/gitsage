# 🧹 Stale Bot
# Marks and closes stale issues and PRs
name: "🧹 Stale Bot"

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  workflow_dispatch: # Allow manual trigger
concurrency:
  group: stale-bot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            👋 This issue has been inactive for 30 days. It will be closed in 14 days
            if there's no further activity. If this issue is still relevant, please
            comment or remove the `stale` label.
          stale-pr-message: >
            👋 This PR has been inactive for 14 days. It will be closed in 7 days
            if there's no further activity. Please update or comment to keep it open.
          close-issue-message: >
            🔒 This issue was closed due to inactivity. Feel free to reopen if it's
            still relevant.
          close-pr-message: >
            🔒 This PR was closed due to inactivity. Feel free to reopen if you'd
            like to continue working on it.
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 14
          days-before-pr-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'P0: Critical,P1: High,good first issue,pinned'
          exempt-pr-labels: 'P0: Critical,P1: High,pinned'
