# 📋 Issue Planner Bot
# Creates implementation plan as a comment when issue gets "needs-plan" label
name: "📋 Issue Planner"

on:
  issues:
    types: [labeled]


concurrency:n  group: issue-planner-${{ github.ref }}n  cancel-in-progress: truen
permissions:
  issues: write

jobs:
  plan:
    if: github.event.label.name == 'needs-plan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title;
            const body = issue.body || '';
            const labels = issue.labels.map(l => l.name);

            // Determine issue type and generate plan template
            const isFeature = labels.includes('enhancement') || title.toLowerCase().includes('add');
            const isBug = labels.includes('bug');
            const isTranslation = labels.includes('translation');
            const isDocs = labels.includes('documentation');

            let plan = `## 📋 Implementation Plan\n\n`;
            plan += `> Auto-generated plan for #${issue.number}. Edit as needed, then add the \`planned\` label to proceed.\n\n`;

            if (isTranslation) {
              const langMatch = title.match(/(?:Add\s+)?(\w+)\s+language/i);
              const lang = langMatch ? langMatch[1] : 'New';
              plan += `### Sub-tasks\n\n`;
              plan += `- [ ] Create \`messages/${lang.toLowerCase().slice(0,2)}.json\` translation file\n`;
              plan += `- [ ] Translate Lesson 1 content in \`content/lessons/${lang.toLowerCase().slice(0,2)}/\`\n`;
              plan += `- [ ] Add locale config to \`src/i18n/request.ts\`\n`;
              plan += `- [ ] Add flag to language selector component\n`;
              plan += `- [ ] Update README language table\n`;
              plan += `- [ ] Add tests for new locale\n`;
            } else if (isBug) {
              plan += `### Investigation\n\n`;
              plan += `- [ ] Reproduce the issue locally\n`;
              plan += `- [ ] Identify root cause\n`;
              plan += `- [ ] Write failing test\n\n`;
              plan += `### Fix\n\n`;
              plan += `- [ ] Implement fix\n`;
              plan += `- [ ] Verify test passes\n`;
              plan += `- [ ] Check for regressions\n`;
              plan += `- [ ] Update documentation if needed\n`;
            } else if (isFeature) {
              plan += `### Design\n\n`;
              plan += `- [ ] Define acceptance criteria\n`;
              plan += `- [ ] Identify affected files/components\n`;
              plan += `- [ ] Consider edge cases\n\n`;
              plan += `### Implementation\n\n`;
              plan += `- [ ] Create feature branch\n`;
              plan += `- [ ] Implement core logic\n`;
              plan += `- [ ] Add unit tests\n`;
              plan += `- [ ] Add integration tests (if applicable)\n`;
              plan += `- [ ] Update documentation\n\n`;
              plan += `### Review\n\n`;
              plan += `- [ ] Self-review checklist\n`;
              plan += `- [ ] Accessibility check\n`;
              plan += `- [ ] Performance check\n`;
            } else {
              plan += `### Tasks\n\n`;
              plan += `- [ ] Analyse requirements\n`;
              plan += `- [ ] Implement changes\n`;
              plan += `- [ ] Add tests\n`;
              plan += `- [ ] Update documentation\n`;
            }

            plan += `\n\n---\n`;
            plan += `*🤖 When the plan looks good, add the \`planned\` label to create sub-issues.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: plan,
            });

            // Remove needs-plan, we've planned it
            console.log(`Plan created for issue #${issue.number}`);
