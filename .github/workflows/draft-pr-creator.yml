# 🚀 Draft PR Creator
# Creates a feature branch and draft PR when issue is labeled "ready-for-dev"
name: "🚀 Draft PR Creator"

on:
  issues:
    types: [labeled]
concurrency:
  group: draft-pr-creator-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-draft-pr:
    if: github.event.label.name == 'ready-for-dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;

            // Generate branch name from issue title
            const branchName = `issue-${issueNumber}/${issue.title
              .toLowerCase()
              .replace(/[^\w\s-]/g, '')
              .replace(/\s+/g, '-')
              .slice(0, 50)}`;

            // Get default branch SHA
            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const defaultBranch = repo.data.default_branch;

            const ref = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${defaultBranch}`,
            });

            // Create branch
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: ref.data.object.sha,
              });
              console.log(`Created branch: ${branchName}`);
            } catch (e) {
              console.log(`Branch may already exist: ${e.message}`);
            }

            // Determine PR body
            const isSubIssue = issue.labels.some(l => l.name === 'sub-issue');
            const parentRef = isSubIssue
              ? issue.body?.match(/Parent:.*#(\d+)/)?.[1]
              : null;

            let prBody = `## Closes #${issueNumber}\n\n`;
            prBody += `### Description\n\n`;
            prBody += `${issue.title}\n\n`;
            if (parentRef) {
              prBody += `**Parent issue:** #${parentRef}\n\n`;
            }
            prBody += `### Changes\n\n`;
            prBody += `- [ ] Implementation\n`;
            prBody += `- [ ] Tests\n`;
            prBody += `- [ ] Documentation\n\n`;
            prBody += `---\n`;
            prBody += `*🤖 Draft PR auto-created. Push your changes to \`${branchName}\`, then mark as Ready for Review.*`;

            // Create draft PR
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[#${issueNumber}] ${issue.title}`,
              body: prBody,
              head: branchName,
              base: defaultBranch,
              draft: true,
            });

            // Comment on issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `🚀 Draft PR created: #${pr.data.number}\n\n**Branch:** \`${branchName}\`\n\nPush your changes and mark the PR as ready for review when done.`,
            });

            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: 'in-progress',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: 'in-progress', color: 'fbca04', description: 'Work in progress',
              });
            }

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: 'ready-for-dev',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: 'ready-for-dev', color: '0e8a16', description: 'Ready for development',
              });
            }

            console.log(`Draft PR #${pr.data.number} created for issue #${issueNumber}`);
